name: Build & Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # 推送到 ghcr.io 需要此权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 启用 QEMU（如需多平台构建，当前仅 linux/amd64）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # BuildKit（支持缓存导出、多平台）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 仅在 push 事件时登录（PR 不推送，跳过登录）
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 自动生成镜像标签：
      #   push main/master  → latest + sha-xxxxxxx
      #   push tag v1.2.3   → v1.2.3 + v1.2 + v1 + latest
      #   pull_request      → pr-123（仅构建不推送）
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=pr
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          # PR 只构建不推送；push 到 main/master 或 tag 才推送
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions 缓存（同 branch 复用上次层缓存，大幅提速）
          cache-from: type=gha
          cache-to: type=gha,mode=max
