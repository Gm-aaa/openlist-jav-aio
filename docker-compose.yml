services:
  jav-aio:
    image: ghcr.io/gm-aaa/openlist-jav-aio:latest
    container_name: jav-aio
    restart: unless-stopped

    volumes:
      # 配置文件（只读，路径已固定为容器内路径）
      - ./config.docker.yaml:/app/config.yaml:ro
      # 输出目录（对应 output.base_dir: /app/data/output）
      - ./output:/app/data/output
      # 状态数据库（对应 state.db_path: /app/data/jav-aio.db）
      - ./jav-aio.db:/app/data/jav-aio.db
      # Whisper 模型缓存（避免重建容器后重新下载，约 1.5~3GB）
      - whisper-models:/app/hf-cache

    ports:
      - "8080:8080"

    environment:
      - TZ=Asia/Shanghai

volumes:
  whisper-models:
